<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Brain Visualizer</title>
    <!--
      coi-serviceworker MUST be registered before any other script so it can
      set COOP/COEP on next load (enables SharedArrayBuffer / WASM threads on
      hosts that can't set headers, e.g. GitHub Pages). gzuidhof shim.
    -->
    <script src="/coi-serviceworker.js"></script>
    <link rel="stylesheet" href="/web/controls.css" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #000;
        overflow: hidden;
      }
      #brain-canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <!-- Top-left: speed controls (BV14). Top-right: backend toggle (BV12). -->
    <div id="controls-top">
      <div id="speed-group" class="btn-group">
        <button data-speed="quarter">¼×</button>
        <button data-speed="half">½×</button>
        <button data-speed="normal" class="active">1×</button>
        <button data-speed="double">2×</button>
      </div>
      <div id="backend-toggle" class="btn-group">
        <button data-backend="gpu" class="active">GPU</button>
        <!-- Phase 6: CPU backend (event-driven rayon worker) is selectable. -->
        <button data-backend="cpu" title="CPU backend (event-driven, rayon)">CPU</button>
      </div>
    </div>

    <!-- Full-bleed brain canvas — everything else overlaid via position:fixed -->
    <canvas id="brain-canvas"></canvas>

    <!-- Bottom-center: brain-state presets (BV15). -->
    <div id="controls-bottom">
      <div id="brain-state-group" class="btn-group">
        <button data-state="deep_sleep">deep sleep</button>
        <button data-state="relaxed">relaxed</button>
        <button data-state="focused" class="active">focused</button>
        <button data-state="hyperstimulated">hyper</button>
        <button data-state="seizure">seizure</button>
      </div>
    </div>

    <!-- Toast notification (used by controls.ts showToast) -->
    <div id="toast"></div>

    <script type="module" src="/web/main.ts"></script>
  </body>
</html>
