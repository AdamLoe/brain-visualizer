<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brain Visualizer</title>
    <!--
      coi-serviceworker MUST be registered before any other script so it can
      set COOP/COEP on next load (enables SharedArrayBuffer / WASM threads on
      hosts that can't set headers, e.g. GitHub Pages). gzuidhof shim.
    -->
    <script src="/coi-serviceworker.js"></script>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #000;
        overflow: hidden;
      }
      #brain-canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <canvas id="brain-canvas"></canvas>
    <script type="module" src="/web/main.ts"></script>
  </body>
</html>
