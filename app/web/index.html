<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Brain Visualizer</title>
    <!--
      coi-serviceworker MUST be registered before any other script so it can
      set COOP/COEP on next load (enables SharedArrayBuffer / WASM threads on
      hosts that can't set headers, e.g. GitHub Pages). gzuidhof shim.
    -->
    <script src="/coi-serviceworker.js"></script>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #000;
        overflow: hidden;
      }
      #brain-canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <!-- UX overhaul: minimal top-right controls — settings only.
         Speed/Tier/Brain-state moved into the settings panel. -->
    <div id="controls-top">
      <div><!-- left side intentionally empty --></div>
      <div style="display:flex;gap:8px;align-items:center;pointer-events:auto;"><!-- UX round 2: pointer-events:auto so the gear button receives clicks -->
        <!-- Settings / gear button (UX overhaul): opens the settings panel. -->
        <button id="settings-toggle" title="Settings" style="background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:#fff;cursor:pointer;font-size:18px;padding:6px 10px;min-width:44px;min-height:44px;">⚙</button>
      </div>
    </div>

    <!-- Bottom-center transport: pause / resume the simulation. Rendering and
         camera orbit continue while paused; only sim ticks are frozen. -->
    <div id="controls-bottom">
      <div class="btn-group">
        <button id="pause-toggle" title="Pause simulation" aria-pressed="false">⏸</button>
      </div>
    </div>

    <!-- Full-bleed brain canvas — everything else overlaid via position:fixed -->
    <canvas id="brain-canvas"></canvas>

    <!-- Toast notification (used by controls.ts showToast) -->
    <div id="toast"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
